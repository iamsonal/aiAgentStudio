openapi: 3.0.3
info:
  title: AI Agent Studio REST API
  description: |
    Enterprise-Grade AI Platform for Salesforce - REST API for processing AI agent messages 
    and executing human-in-the-loop approved actions.
    
    ## Authentication
    All endpoints require Salesforce authentication via OAuth 2.0 or Session ID.
    
    ## Base URL
    `https://<your-salesforce-instance>.salesforce.com/services/apexrest`
    
  version: 1.0.0
  contact:
    name: AI Agent Studio Support
    url: https://github.com/iamsonal/aiAgentStudio
  license:
    name: Mozilla Public License 2.0
    url: https://opensource.org/licenses/MPL-2.0

servers:
  - url: https://{instance}.salesforce.com/services/apexrest
    description: Salesforce Production
    variables:
      instance:
        default: your-instance
        description: Your Salesforce instance domain (e.g., na1, cs1, or MyDomainName)
  - url: https://{instance}.sandbox.salesforce.com/services/apexrest
    description: Salesforce Sandbox
    variables:
      instance:
        default: your-instance--sandbox
        description: Your Salesforce sandbox instance

tags:
  - name: Chat
    description: Agent message processing endpoints
  - name: HITL
    description: Human-in-the-loop tool execution endpoints

security:
  - OAuth2: []
  - BearerAuth: []

paths:
  /ai/agent/process:
    post:
      tags:
        - Chat
      summary: Process Chat Message
      description: |
        Process an agent turn with full conversation context.
        This endpoint initiates or continues an agent execution session.
        
        **Use Cases:**
        - Start new conversations
        - Continue existing conversations
        - Provide contextual information via currentRecordId
        - Trigger function-style or service-user executions
        
        **Processing:**
        - Executes in service user context (elevated permissions)
        - Asynchronous processing with status tracking
        - Supports multi-turn conversations
      operationId: processChatMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatMessageRequest'
            examples:
              startConversation:
                summary: Start new conversation
                value:
                  originalUserId: "0055g000001234567"
                  agentDefinitionId: "a0Y5g000001234567"
                  turnIdentifier: "turn-2024-01-15-12-30-45-abc123"
                  userMessage: "Help me close this case"
                  currentRecordId: "5005g000001234567"
              continueConversation:
                summary: Continue existing conversation
                value:
                  executionId: "a0X5g000001234567"
                  interactionSessionId: "a105g000001234567"
                  originalUserId: "0055g000001234567"
                  agentDefinitionId: "a0Y5g000001234567"
                  turnIdentifier: "turn-2024-01-15-12-31-00-def456"
                  userMessage: "Yes, please create that task"
                  currentRecordId: "5005g000001234567"
      responses:
        '200':
          description: Request successfully processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
              examples:
                success:
                  summary: Successful processing
                  value:
                    success: true
                    outcome: "Processing"
                    error: null
                    requestId: "12345678"
                    executionId: "a0X5g000001234567"
                    interactionSessionId: "a105g000001234567"
        '400':
          description: Bad Request - Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
              examples:
                missingField:
                  summary: Missing required field
                  value:
                    success: false
                    outcome: null
                    error: "originalUserId is required"
                    requestId: "12345678"
                invalidId:
                  summary: Invalid ID format
                  value:
                    success: false
                    outcome: null
                    error: "Invalid executionId format: abc123"
                    requestId: "12345678"
        '403':
          description: Forbidden - Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
              examples:
                accessDenied:
                  summary: Insufficient privileges
                  value:
                    success: false
                    outcome: null
                    error: "Access denied: Insufficient privileges"
                    requestId: "12345678"
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
              examples:
                serverError:
                  summary: Unexpected error
                  value:
                    success: false
                    outcome: null
                    error: "Internal server error: Unexpected exception occurred"
                    requestId: "12345678"

  /ai/agent/hitl/execute:
    post:
      tags:
        - HITL
      summary: Execute HITL Approved Tool
      description: |
        Execute a tool that has been approved through the Human-in-the-Loop workflow.
        This endpoint is called after a user approves an action that requires human confirmation or approval.
        
        **Use Cases:**
        - Execute approved data modifications
        - Execute actions requiring elevated permissions
        - Resume agent workflow after approval
        
        **Processing:**
        - Executes in authenticated user context (user-specific permissions)
        - Supports optional follow-up LLM calls
        - Sends notifications based on capability settings
      operationId: executeHITLTool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HITLToolRequest'
            examples:
              createTask:
                summary: Create approved task
                value:
                  pendingActionId: "a0Z5g000001234567"
                  executionId: "a0X5g000001234567"
                  capabilityId: "a0W5g000001234567"
                  toolCallId: "call_abc123xyz789"
                  toolName: "CreateTask"
                  toolArguments: "{\"Subject\":\"Follow up on case\",\"Priority\":\"High\",\"WhatId\":\"5005g000001234567\"}"
                  turnIdentifier: "turn-2024-01-15-12-30-45-abc123"
                  turnCount: 3
                  sourceRecordId: "5005g000001234567"
                  requestingUserId: "0055g000001234567"
                  needsFollowUp: true
              updateRecord:
                summary: Update approved record
                value:
                  pendingActionId: "a0Z5g000001234568"
                  executionId: "a0X5g000001234567"
                  capabilityId: "a0W5g000001234568"
                  toolCallId: "call_def456xyz123"
                  toolName: "UpdateCase"
                  toolArguments: "{\"Id\":\"5005g000001234567\",\"Status\":\"Closed\",\"Resolution\":\"Issue resolved\"}"
                  turnIdentifier: "turn-2024-01-15-12-32-00-ghi789"
                  turnCount: 4
                  requestingUserId: "0055g000001234567"
                  needsFollowUp: false
      responses:
        '200':
          description: Tool executed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
              examples:
                success:
                  summary: Successful execution
                  value:
                    success: true
                    outcome: "Tool executed successfully"
                    error: null
                    requestId: "12345678"
        '400':
          description: Bad Request - Invalid input or configuration error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
              examples:
                missingField:
                  summary: Missing required field
                  value:
                    success: false
                    outcome: null
                    error: "capabilityId is required"
                    requestId: "12345678"
                capabilityNotFound:
                  summary: Capability not found
                  value:
                    success: false
                    outcome: null
                    error: "Configuration error: Capability not found"
                    requestId: "12345678"
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
        '500':
          description: Internal Server Error - Tool execution failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
              examples:
                executionError:
                  summary: Tool execution failure
                  value:
                    success: false
                    outcome: null
                    error: "Internal server error: DML exception occurred"
                    requestId: "12345678"

  /ai/agent/hitl/followup:
    post:
      tags:
        - HITL
      summary: Queue HITL Follow-Up LLM Call
      description: |
        Queue a follow-up LLM call after a HITL action was rejected, declined, or expired.
        This endpoint runs in service-user context and resumes the execution so the agent can continue.
      operationId: queueHITLFollowUp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HITLFollowUpRequest'
            examples:
              rejectedFollowUp:
                summary: Queue follow-up after rejection
                value:
                  executionId: "a0X5g000001234567"
                  turnIdentifier: "turn-2024-01-15-12-32-00-ghi789"
                  turnCount: 4
                  sourceRecordId: "5005g000001234567"
      responses:
        '200':
          description: Follow-up queued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
              examples:
                success:
                  value:
                    success: true
                    outcome: "QUEUED_FOLLOWUP"
                    error: null
                    requestId: "12345678"
        '400':
          description: Bad Request - Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
              examples:
                missingExecutionId:
                  value:
                    success: false
                    outcome: null
                    error: "executionId is required"
                    requestId: "12345678"
                missingTurnIdentifier:
                  value:
                    success: false
                    outcome: null
                    error: "turnIdentifier is required"
                    requestId: "12345678"
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'

  /ai/agent/resume:
    post:
      tags:
        - HITL
      summary: Resume Execution In Service Context
      description: |
        Resume an execution in service-user context.
        This endpoint is used by service-user routing and manual recovery flows.
      operationId: resumeExecution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResumeRequest'
            examples:
              standardResume:
                summary: Resume execution
                value:
                  executionId: "a0X5g000001234567"
                  resumeReason: "Resume via service user context"
                  retryFailedTool: false
      responses:
        '200':
          description: Resume request processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
              examples:
                success:
                  value:
                    success: true
                    outcome: "Resume initiated successfully"
                    error: null
                    requestId: "12345678"
        '400':
          description: Bad Request - Invalid input or non-resumable execution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
              examples:
                missingExecutionId:
                  value:
                    success: false
                    outcome: null
                    error: "executionId is required"
                    requestId: "12345678"
                alreadyCompleted:
                  value:
                    success: false
                    outcome: null
                    error: "Execution is already completed. Nothing to resume."
                    requestId: "12345678"
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'

components:
  securitySchemes:
    OAuth2:
      type: oauth2
      description: Salesforce OAuth 2.0 authentication
      flows:
        authorizationCode:
          authorizationUrl: https://login.salesforce.com/services/oauth2/authorize
          tokenUrl: https://login.salesforce.com/services/oauth2/token
          scopes:
            api: Access Salesforce APIs
            full: Full access to all data
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Session ID
      description: Salesforce Session ID or OAuth access token

  schemas:
    ChatMessageRequest:
      type: object
      required:
        - originalUserId
        - agentDefinitionId
        - turnIdentifier
      properties:
        executionId:
          type: string
          pattern: '^[a-zA-Z0-9]{15}$|^[a-zA-Z0-9]{18}$'
          description: Existing AgentExecution__c ID. Omit to start a new execution.
          example: "a0X5g000001234567"
          nullable: true
        interactionSessionId:
          type: string
          pattern: '^[a-zA-Z0-9]{15}$|^[a-zA-Z0-9]{18}$'
          description: Optional durable InteractionSession__c ID used to preserve continuity across executions.
          example: "a105g000001234567"
          nullable: true
        originalUserId:
          type: string
          pattern: '^005[a-zA-Z0-9]{12}$|^005[a-zA-Z0-9]{15}$'
          description: Salesforce User ID who initiated the request
          example: "0055g000001234567"
        agentDefinitionId:
          type: string
          pattern: '^[a-zA-Z0-9]{15}$|^[a-zA-Z0-9]{18}$'
          description: ID of the AIAgentDefinition__c record
          example: "a0Y5g000001234567"
        turnIdentifier:
          type: string
          maxLength: 255
          description: Unique identifier for this conversation turn
          example: "turn-2024-01-15-12-30-45-abc123"
        userMessage:
          type: string
          maxLength: 32000
          description: The user's message text. Optional for non-conversational or service-triggered executions.
          example: "Help me close this case"
          nullable: true
        currentRecordId:
          type: string
          pattern: '^[a-zA-Z0-9]{15}$|^[a-zA-Z0-9]{18}$'
          description: Contextual Salesforce record ID (optional)
          example: "5005g000001234567"
          nullable: true
        sourceRecordId:
          type: string
          pattern: '^[a-zA-Z0-9]{15}$|^[a-zA-Z0-9]{18}$'
          description: Source record ID associated with the execution context
          example: "5005g000001234567"
          nullable: true
        sourceRecordIds:
          type: array
          description: Multiple source record IDs for batch or workflow-triggered executions
          items:
            type: string
            pattern: '^[a-zA-Z0-9]{15}$|^[a-zA-Z0-9]{18}$'
          nullable: true
        triggerPayload:
          type: string
          description: Serialized trigger payload or upstream workflow context
          example: "{\"caseId\":\"5005g000001234567\"}"
          nullable: true
        triggerSource:
          type: string
          description: Origin of the execution request
          example: "API"
          nullable: true
        batchId:
          type: string
          description: Optional batch or orchestration identifier
          example: "batch-2024-01-15-001"
          nullable: true
        priority:
          type: integer
          description: Optional execution priority
          example: 1
          nullable: true

    HITLToolRequest:
      type: object
      required:
        - pendingActionId
        - executionId
        - capabilityId
      properties:
        pendingActionId:
          type: string
          pattern: '^[a-zA-Z0-9]{15}$|^[a-zA-Z0-9]{18}$'
          description: ID of the PendingHITLAction__c record
          example: "a0Z5g000001234567"
        executionId:
          type: string
          pattern: '^[a-zA-Z0-9]{15}$|^[a-zA-Z0-9]{18}$'
          description: ID of the AgentExecution__c record
          example: "a0X5g000001234567"
        capabilityId:
          type: string
          pattern: '^[a-zA-Z0-9]{15}$|^[a-zA-Z0-9]{18}$'
          description: ID of the AgentCapability__c to execute
          example: "a0W5g000001234567"
        toolCallId:
          type: string
          maxLength: 255
          description: LLM tool call identifier
          example: "call_abc123xyz789"
        toolName:
          type: string
          maxLength: 255
          description: Name of the tool being executed
          example: "CreateTask"
        toolArguments:
          type: string
          description: JSON string of tool arguments
          example: "{\"Subject\":\"Follow up\",\"Priority\":\"High\"}"
        turnIdentifier:
          type: string
          maxLength: 255
          description: Conversation turn identifier
          example: "turn-2024-01-15-12-30-45-abc123"
        turnCount:
          type: number
          minimum: 1
          description: Current turn count in the conversation
          example: 3
          nullable: true
        sourceRecordId:
          type: string
          pattern: '^[a-zA-Z0-9]{15}$|^[a-zA-Z0-9]{18}$'
          description: Contextual Salesforce record ID
          example: "5005g000001234567"
          nullable: true
        requestingUserId:
          type: string
          pattern: '^005[a-zA-Z0-9]{12}$|^005[a-zA-Z0-9]{15}$'
          description: User ID who requested the action (for notifications)
          example: "0055g000001234567"
          nullable: true
        needsFollowUp:
          type: boolean
          description: Whether a follow-up LLM call is needed after execution
          example: true
          nullable: true

    AgentResponse:
      type: object
      required:
        - success
        - requestId
      properties:
        success:
          type: boolean
          description: Indicates if the request was successfully processed
          example: true
        outcome:
          type: string
          description: Processing status or result message
          example: "Processing"
          nullable: true
        error:
          type: string
          description: Error message if success is false
          example: null
          nullable: true
        requestId:
          type: string
          pattern: '^\d{8}$'
          description: Unique request identifier for troubleshooting
          example: "12345678"
        executionId:
          type: string
          pattern: '^[a-zA-Z0-9]{15}$|^[a-zA-Z0-9]{18}$'
          description: AgentExecution__c ID when the request creates or continues a tracked execution
          example: "a0X5g000001234567"
          nullable: true
        interactionSessionId:
          type: string
          pattern: '^[a-zA-Z0-9]{15}$|^[a-zA-Z0-9]{18}$'
          description: InteractionSession__c ID when the execution is bound to a durable session
          example: "a105g000001234567"
          nullable: true

    HITLFollowUpRequest:
      type: object
      required:
        - executionId
        - turnIdentifier
      properties:
        executionId:
          type: string
          pattern: '^[a-zA-Z0-9]{15}$|^[a-zA-Z0-9]{18}$'
          description: ID of the AgentExecution__c record to resume for follow-up
          example: "a0X5g000001234567"
        turnIdentifier:
          type: string
          maxLength: 255
          description: Turn identifier associated with the pending follow-up
          example: "turn-2024-01-15-12-32-00-ghi789"
        turnCount:
          type: number
          minimum: 1
          description: Current turn count prior to follow-up enqueueing
          example: 4
          nullable: true
        sourceRecordId:
          type: string
          pattern: '^[a-zA-Z0-9]{15}$|^[a-zA-Z0-9]{18}$'
          description: Optional source record context
          example: "5005g000001234567"
          nullable: true

    ResumeRequest:
      type: object
      required:
        - executionId
      properties:
        executionId:
          type: string
          pattern: '^[a-zA-Z0-9]{15}$|^[a-zA-Z0-9]{18}$'
          description: ID of the AgentExecution__c record to resume
          example: "a0X5g000001234567"
        resumeReason:
          type: string
          description: Human-readable reason recorded with the resume request
          example: "Resume via service user context"
          nullable: true
        retryFailedTool:
          type: boolean
          description: Whether the resume should retry the previously failed tool
          example: false
          nullable: true

  examples:
    ChatRequestExample:
      value:
        originalUserId: "0055g000001234567"
        agentDefinitionId: "a0Y5g000001234567"
        turnIdentifier: "turn-2024-01-15-12-30-45-abc123"
        userMessage: "Help me close this case"
        currentRecordId: "5005g000001234567"

    HITLRequestExample:
      value:
        pendingActionId: "a0Z5g000001234567"
        executionId: "a0X5g000001234567"
        capabilityId: "a0W5g000001234567"
        toolCallId: "call_abc123xyz789"
        toolName: "CreateTask"
        toolArguments: "{\"Subject\":\"Follow up on case\",\"Priority\":\"High\"}"
        turnIdentifier: "turn-2024-01-15-12-30-45-abc123"
        turnCount: 3
        requestingUserId: "0055g000001234567"
        needsFollowUp: true

    HITLFollowUpRequestExample:
      value:
        executionId: "a0X5g000001234567"
        turnIdentifier: "turn-2024-01-15-12-32-00-ghi789"
        turnCount: 4
        sourceRecordId: "5005g000001234567"

    ResumeRequestExample:
      value:
        executionId: "a0X5g000001234567"
        resumeReason: "Resume via service user context"
        retryFailedTool: false

    SuccessResponseExample:
      value:
        success: true
        outcome: "Processing"
        error: null
        requestId: "12345678"
        executionId: "a0X5g000001234567"
        interactionSessionId: "a105g000001234567"

    ErrorResponseExample:
      value:
        success: false
        outcome: null
        error: "originalUserId is required"
        requestId: "12345678"
