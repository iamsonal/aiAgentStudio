<template>
    <div class="editor-root">
        <!-- ── Toolbar ───────────────────────────────────────────────── -->
        <div class="toolbar">
            <!-- Edit-mode controls -->
            <template lwc:if={isEditMode}>
                <button class="toolbar-btn toolbar-btn--primary" onclick={handleGenerate} disabled={isLoading} title="Generate flow graph with AI">
                    <lightning-icon icon-name="utility:sparkles" size="x-small" variant="inverse"></lightning-icon>
                    Generate
                </button>
                <div class="toolbar-divider"></div>
                <button class="toolbar-btn" onclick={handleUndo} disabled={cannotUndo} title="Undo">
                    <lightning-icon icon-name="utility:undo" size="x-small"></lightning-icon>
                </button>
                <button class="toolbar-btn" onclick={handleRedo} disabled={cannotRedo} title="Redo">
                    <lightning-icon icon-name="utility:redo" size="x-small"></lightning-icon>
                </button>
                <div class="toolbar-divider"></div>
                <button class="toolbar-btn toolbar-btn--danger" onclick={handleClear} title="Clear graph">
                    <lightning-icon icon-name="utility:clear" size="x-small"></lightning-icon>
                    Clear
                </button>
            </template>

            <div class="toolbar-spacer"></div>

            <!-- Edit mode: badge + Cancel + Save -->
            <template lwc:if={isEditMode}>
                <span class="toolbar-edit-badge">Editing</span>
                <button class="toolbar-btn toolbar-btn--neutral" onclick={handleCancelEdit} title="Discard changes and return to read-only view">
                    <lightning-icon icon-name="utility:close" size="x-small"></lightning-icon>
                    Cancel
                </button>
                <button class="toolbar-btn toolbar-btn--save" onclick={handleSave} disabled={cannotSave} title="Save graph">
                    <lightning-icon icon-name="utility:save" size="x-small" variant="inverse"></lightning-icon>
                    Save
                </button>
            </template>
            <!-- Read-only mode: show Edit button only -->
            <template lwc:else>
                <button class="toolbar-btn toolbar-btn--edit" onclick={handleEditClick} title="Edit the tool flow graph">
                    <lightning-icon icon-name="utility:edit" size="x-small"></lightning-icon>
                    Edit
                </button>
            </template>
        </div>

        <!-- ── Stale banner ──────────────────────────────────────────── -->
        <template lwc:if={showStaleBanner}>
            <div class="stale-banner">
                <lightning-icon icon-name="utility:warning" size="x-small" variant="warning"></lightning-icon>
                <span>{staleBannerMessage}</span>
                <button class="stale-dismiss" onclick={dismissStale}>✕</button>
            </div>
        </template>
        <template lwc:if={hasDiagnosticsWarnings}>
            <div class="diagnostics-banner">
                <lightning-icon icon-name="utility:info_alt" size="x-small"></lightning-icon>
                <span>{diagnosticsSummary}</span>
            </div>
        </template>

        <!-- ── Main work area ─────────────────────────────────────────── -->
        <div class="work-area">
            <!-- ── Canvas ─────────────────────────────────────────────── -->
            <div class="canvas-col">
                <!-- Scrollable viewport: grows when graph is taller than the screen -->
                <div class="cy-scroll-area">
                    <div
                        class="cy-wrap"
                        style={cyWrapStyle}
                        lwc:ref="cyContainer"
                        ondragover={onCanvasDragOver}
                        ondragleave={onCanvasDragLeave}
                        ondrop={onCanvasDrop}
                    >
                        <!-- Library loading overlay -->
                        <template lwc:if={isLibLoading}>
                            <div class="lib-loading">
                                <lightning-spinner alternative-text="Loading graph library" size="medium"></lightning-spinner>
                                <p>Loading graph library…</p>
                            </div>
                        </template>

                        <!-- "+" buttons — one per edge -->
                        <template for:each={edgeMidpoints} for:item="ep">
                            <button
                                key={ep.key}
                                class="plus-btn"
                                style={ep.style}
                                data-edgeid={ep.edgeId}
                                data-sourceid={ep.sourceId}
                                data-targetid={ep.targetId}
                                onmousedown={suppressBackgroundTap}
                                onclick={onPlusBtnClick}
                                aria-label="Insert step or branch"
                                title="Insert here"
                            >
                                +
                            </button>
                        </template>

                        <!-- "+" buttons — one per branching fork (source with ≥2 exclusive edges) -->
                        <template for:each={branchOriginButtons} for:item="bo">
                            <button
                                key={bo.key}
                                class="plus-btn plus-btn--branch-origin"
                                style={bo.style}
                                data-sourceid={bo.sourceId}
                                onmousedown={suppressBackgroundTap}
                                onclick={onBranchOriginClick}
                                aria-label="Add branch or step at this fork"
                                title="Add to fork"
                            >
                                +
                            </button>
                        </template>

                        <!-- Parallel node overlays (pointer-events:none — purely visual) -->
                        <template for:each={parallelNodes} for:item="pn">
                            <div key={pn.key} class="node-overlay node-overlay--parallel" style={pn.style}>
                                <div class="node-overlay__header">
                                    <span class="node-overlay__badge">⇉ Parallel</span>
                                </div>
                                <ul class="node-overlay__chips">
                                    <template for:each={pn.tools} for:item="tool">
                                        <li key={tool.key} class="node-overlay__chip">{tool.name}</li>
                                    </template>
                                </ul>
                            </div>
                        </template>

                        <!-- Condition labels — one pill per exclusive edge, clickable to edit inline -->
                        <template for:each={conditionLabels} for:item="cl">
                            <button
                                key={cl.key}
                                class={cl.labelClass}
                                style={cl.style}
                                data-edgeid={cl.edgeId}
                                onmousedown={suppressBackgroundTap}
                                onclick={handleConditionLabelClick}
                                aria-label={cl.ariaLabel}
                                title={cl.label}
                            >
                                {cl.label}
                            </button>
                        </template>

                        <!-- Inline condition editor — appears on-canvas when a condition label is clicked -->
                        <template lwc:if={showInlineConditionEditor}>
                            <div class="inline-cond-editor" style={inlineConditionEditor.style} onmousedown={suppressBackgroundTap}>
                                <p class="inline-cond-editor__hint">When should the agent take this branch?</p>
                                <div class="inline-cond-editor__row">
                                    <input
                                        type="text"
                                        class="inline-cond-editor__input"
                                        placeholder="e.g. When ticket priority is critical"
                                        onkeyup={handleInlineConditionKeyup}
                                    />
                                    <button class="inline-cond-editor__save" onclick={saveInlineCondition} title="Save (Enter)">✓</button>
                                    <button class="inline-cond-editor__cancel" onclick={cancelInlineCondition} title="Cancel (Esc)">✕</button>
                                </div>
                            </div>
                        </template>

                        <!-- s9: Insertion modal (2 options: Step + Branch) -->
                        <template lwc:if={showInsertionModal}>
                            <!-- Transparent backdrop — clicking outside the modal dismisses it -->
                            <div class="modal-backdrop" onclick={dismissModal}></div>
                            <div class="insertion-modal" style={insertionModalStyle} onmousedown={suppressBackgroundTap}>
                                <div class="insertion-modal__header">
                                    <span class="insertion-modal__title">Insert here</span>
                                    <button class="insertion-modal__close" onclick={dismissModal} title="Close">✕</button>
                                </div>
                                <div class="insertion-modal__options">
                                    <!-- Step option -->
                                    <button class="modal-option" onclick={handleModalStep}>
                                        <div class="modal-option__icon modal-option__icon--step">
                                            <lightning-icon icon-name="utility:record_create" size="small"></lightning-icon>
                                        </div>
                                        <div class="modal-option__text">
                                            <strong>{modalStepTitle}</strong>
                                            <span>{modalStepDesc}</span>
                                        </div>
                                    </button>
                                    <!-- Branch option — disabled when source is Start or a placeholder -->
                                    <button class={branchOptionClass} disabled={branchOptionDisabled} onclick={handleModalBranch}>
                                        <div class="modal-option__icon modal-option__icon--branch">
                                            <lightning-icon icon-name="utility:routing_offline" size="small"></lightning-icon>
                                        </div>
                                        <div class="modal-option__text">
                                            <strong>{modalBranchTitle}</strong>
                                            <span>{modalBranchDesc}</span>
                                        </div>
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
                <!-- /cy-scroll-area -->

                <!-- Zoom controls — pinned to bottom-right of the canvas area, above status strip -->
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick={handleZoomIn} title="Zoom in">+</button>
                    <button class="zoom-btn" onclick={handleFit} title="Fit to view">⤢</button>
                    <button class="zoom-btn" onclick={handleZoomOut} title="Zoom out">−</button>
                </div>

                <!-- Status strip — pinned below the scrollable canvas -->
                <div class="status-strip">
                    <template lwc:if={isLoading}>
                        <lightning-spinner alternative-text="Working…" size="small"></lightning-spinner>
                    </template>
                    <span class="status-stat">
                        <lightning-icon icon-name="utility:record_create" size="xx-small"></lightning-icon>
                        {nodeCount} step<template lwc:if={nodeCountPlural}>s</template>
                    </span>
                    <span class="status-stat">
                        <lightning-icon icon-name="utility:connected_apps" size="xx-small"></lightning-icon>
                        {edgeCount} connection<template lwc:if={edgeCountPlural}>s</template>
                    </span>
                    <template lwc:if={graphDiagnostics.missingConditionCount}>
                        <span class="status-stat status-stat--warning">
                            <lightning-icon icon-name="utility:warning" size="xx-small"></lightning-icon>
                            {graphDiagnostics.missingConditionCount} branch condition issues
                        </span>
                    </template>
                    <template lwc:if={graphDiagnostics.parallelConflictCount}>
                        <span class="status-stat status-stat--warning">
                            <lightning-icon icon-name="utility:block_visitor" size="xx-small"></lightning-icon>
                            {graphDiagnostics.parallelConflictCount} parallel conflicts
                        </span>
                    </template>
                    <template lwc:if={isDirty}>
                        <span class="status-dirty">● Unsaved changes</span>
                    </template>
                </div>
            </div>

            <!-- ── Sidebar ─────────────────────────────────────────────── -->
            <aside class="sidebar">
                <!-- Node inspector (works in both read-only and edit mode) -->
                <template lwc:if={hasSelectedNode}>
                    <div class="panel">
                        <div class="panel-header">
                            <lightning-icon icon-name="utility:record_create" size="x-small"></lightning-icon>
                            <span class="panel-title">{selectedNodeLabel}</span>
                        </div>
                        <div class="inspector-body">
                            <!-- Tools in this step -->
                            <template lwc:if={selectedNodeHasMultipleTools}>
                                <p class="inspector-label">Tools in this step (parallel)</p>
                                <ul class="tool-chip-list">
                                    <template for:each={selectedNodeTools} for:item="tool">
                                        <li key={tool.key} class="tool-chip">
                                            <lightning-icon icon-name="utility:apex_plugin" size="xx-small"></lightning-icon>
                                            {tool.name}
                                        </li>
                                    </template>
                                </ul>
                            </template>

                            <!-- Edit-only inspector actions -->
                            <template lwc:if={isEditMode}>
                                <!-- Outgoing connections (with delete) -->
                                <template lwc:if={selectedNodeEdges.length}>
                                    <p class="inspector-label">Outgoing connections</p>
                                    <ul class="edge-list">
                                        <template for:each={selectedNodeEdges} for:item="edge">
                                            <li class="edge-item" key={edge.key}>
                                                <lightning-icon icon-name="utility:forward" size="xx-small"></lightning-icon>
                                                <span class="edge-target">{edge.toLabel}</span>
                                                <span class={edge.typePill}>{edge.typeLabel}</span>
                                                <template lwc:if={edge.issueText}>
                                                    <span class="edge-issue">{edge.issueText}</span>
                                                </template>
                                                <button class="edge-delete" data-edgeid={edge.edgeId} onclick={deleteEdge} title="Remove connection">✕</button>
                                            </li>
                                        </template>
                                    </ul>
                                </template>

                                <button class="btn btn--full btn--danger-outline" onclick={deleteSelectedNode}>
                                    <lightning-icon icon-name="utility:delete" size="x-small"></lightning-icon>
                                    Delete step
                                </button>
                            </template>

                            <!-- Read-only: show outgoing connections without delete -->
                            <template lwc:else>
                                <template lwc:if={selectedNodeEdges.length}>
                                    <p class="inspector-label">Outgoing connections</p>
                                    <ul class="edge-list">
                                        <template for:each={selectedNodeEdges} for:item="edge">
                                            <li class="edge-item" key={edge.key}>
                                                <lightning-icon icon-name="utility:forward" size="xx-small"></lightning-icon>
                                                <span class="edge-target">{edge.toLabel}</span>
                                                <span class={edge.typePill}>{edge.typeLabel}</span>
                                                <template lwc:if={edge.issueText}>
                                                    <span class="edge-issue">{edge.issueText}</span>
                                                </template>
                                            </li>
                                        </template>
                                    </ul>
                                </template>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- Read-only info panel (no node selected, view mode) -->
                <template lwc:if={showReadOnlyInfo}>
                    <div class="panel panel--readonly-hint">
                        <div class="panel-header">
                            <lightning-icon icon-name="utility:preview" size="x-small"></lightning-icon>
                            <span class="panel-title">Read-only view</span>
                        </div>
                        <p class="readonly-hint-text">Click <strong>Edit</strong> in the toolbar to modify the flow graph.</p>
                        <p class="readonly-hint-text">Click any step to view its details.</p>
                    </div>
                </template>

                <!-- Default sidebar: capabilities + legend (edit mode only) -->
                <template lwc:if={showDefaultSidebar}>
                    <div class="panel">
                        <div class="panel-header">
                            <lightning-icon icon-name="utility:apex_plugin" size="x-small"></lightning-icon>
                            <span class="panel-title">Available Tools</span>
                        </div>
                        <p class="palette-hint">{paletteHint}</p>
                        <template lwc:if={hasAvailableTools}>
                            <ul class="palette-list">
                                <template for:each={availableCapabilities} for:item="cap">
                                    <li
                                        key={cap.name}
                                        class={cap.itemClass}
                                        draggable="true"
                                        data-name={cap.name}
                                        ondragstart={onCapabilityDragStart}
                                        title={cap.title}
                                    >
                                        <lightning-icon icon-name="utility:drag_and_drop" size="x-small" class="drag-handle"></lightning-icon>
                                        <span class="palette-item__name">{cap.name}</span>
                                        <template lwc:if={cap.blocked}>
                                            <lightning-icon icon-name="utility:ban" size="xx-small" class="palette-item__blocked-icon"></lightning-icon>
                                        </template>
                                    </li>
                                </template>
                            </ul>
                        </template>
                        <template lwc:else>
                            <p class="empty-palette">No capabilities found.</p>
                        </template>
                    </div>

                    <!-- Legend -->
                    <div class="panel panel--legend">
                        <div class="panel-header">
                            <lightning-icon icon-name="utility:info" size="x-small"></lightning-icon>
                            <span class="panel-title">How to use</span>
                        </div>
                        <ul class="legend-list">
                            <li class="legend-item"><span class="legend-swatch legend-swatch--sequential"></span>Sequential step</li>
                            <li class="legend-item"><span class="legend-swatch legend-swatch--exclusive"></span>Exclusive branch</li>
                            <li class="legend-item legend-item--hint">Click <strong>+</strong> on a connector to insert a Step or Branch</li>
                            <template lwc:if={parallelLegendHint}>
                                <li class="legend-item legend-item--hint">Drop a 2nd tool onto any step to run them in parallel</li>
                            </template>
                            <li class="legend-item legend-item--hint">Click a branch connector to add a condition note</li>
                        </ul>
                    </div>
                </template>
            </aside>
        </div>
    </div>
</template>
